name: Vendor SheetJS 0.20.3

on:
  push:
    branches:
      - codex/perform-baseline-analysis-on-icr-dashboard-html
    paths:
      - .github/workflows/vendor-sheetjs.yml

permissions:
  contents: write

jobs:
  vendor-sheetjs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: codex/perform-baseline-analysis-on-icr-dashboard-html
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download official SheetJS archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vendor
          curl --fail --location --retry 3 --retry-delay 2 \
            --output vendor/xlsx-0.20.3.tgz \
            https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz

      - name: Verify archive identity
        shell: bash
        run: |
          set -euo pipefail
          test -s vendor/xlsx-0.20.3.tgz
          tar -tzf vendor/xlsx-0.20.3.tgz >/dev/null
          tar -xOf vendor/xlsx-0.20.3.tgz package/package.json > /tmp/xlsx-package.json
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('/tmp/xlsx-package.json', 'utf8'));
          if (pkg.name !== 'xlsx' || pkg.version !== '0.20.3') {
            throw new Error(`Unexpected package identity: ${pkg.name}@${pkg.version}`);
          }
          console.log(`Verified ${pkg.name}@${pkg.version}`);
          NODE
          sha256sum vendor/xlsx-0.20.3.tgz

      - name: Replace vulnerable npm dependency
        shell: bash
        run: |
          set -euo pipefail
          npm uninstall xlsx
          npm install --save file:vendor/xlsx-0.20.3.tgz
          node -p "require('./node_modules/xlsx/package.json').version"

      - name: Validate clean installation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules
          npm ci
          test "$(node -p "require('./node_modules/xlsx/package.json').version")" = "0.20.3"

      - name: Run project validation
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run typecheck
          npm run build
          git diff --check

      - name: Record audit result
        shell: bash
        continue-on-error: true
        run: npm audit --omit=dev

      - name: Commit hardened dependency
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/vendor-sheetjs.yml
          git add vendor/xlsx-0.20.3.tgz package.json package-lock.json
          git commit -m "Harden ICR spreadsheet dependency"
          git push origin HEAD:codex/perform-baseline-analysis-on-icr-dashboard-html
