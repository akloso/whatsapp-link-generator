<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Splitzap</title>
</head>
<body>
  <script src="/splitzap-assets/chunk-00.js"></script>
  <script src="/splitzap-assets/chunk-01.js"></script>
  <script src="/splitzap-assets/chunk-02.js"></script>
  <script src="/splitzap-assets/chunk-03.js"></script>
  <script src="/splitzap-assets/chunk-04.js"></script>
  <script src="/splitzap-assets/chunk-05.js"></script>
  <script src="/splitzap-assets/chunk-06.js"></script>
  <script src="/splitzap-assets/chunk-07.js"></script>
  <script src="/splitzap-assets/chunk-08.js"></script>
  <script src="/splitzap-assets/chunk-09.js"></script>
  <script>
    function decodeBase64Utf8(base64) {
      var binary = atob(base64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new TextDecoder('utf-8').decode(bytes);
    }

    var splitzapHtml = (window.__splitzapChunks || [])
      .map(function (chunk) { return decodeBase64Utf8(chunk); })
      .join('');

    document.open();
    document.write(splitzapHtml);
    document.close();
  </script>
</body>
</html>
